<!doctype html>
<html lang="en">

<meta name="viewport" content="width=device-width,initial-scale=1" />
<script src="https://cdn.tailwindcss.com"></script>

<style>
  html, body, #root { height: 100%; }
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: #f8fafc; color: #0f172a; }
  .gantt-scroll { overflow: auto; }

  .mo-bar { cursor: grab; user-select: none; }
  .mo-bar.dragging { cursor: grabbing; opacity: 0.85; pointer-events: none; }
  body.dragging-mo .mo-bar { pointer-events: none; }
  .day-cell { stroke: #e2e8f0; stroke-width: 1; }
  .scrollbar-thin::-webkit-scrollbar { height: 10px; width: 10px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 6px; }

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
/* ============================================================================
   Production Scenario Scheduler — v1 prototype
   Single-file React app. Excel / CSV in, Excel / CSV out. All processing local.
   ========================================================================== */

const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ------------------------------ date helpers ------------------------------ */
const MS_DAY = 86400000;
const pad = n => String(n).padStart(2, "0");
const toISO = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const parseISO = s => {
  if (!s) return null;
  if (s instanceof Date) return new Date(s.getFullYear(), s.getMonth(), s.getDate());
  if (typeof s === "number") {
    // Excel serial date
    const epoch = new Date(Date.UTC(1899, 11, 30));
    return new Date(epoch.getTime() + Math.round(s) * MS_DAY);
  }
  const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  const d = new Date(s);
  return isNaN(d) ? null : new Date(d.getFullYear(), d.getMonth(), d.getDate());
};
const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r; };
const diffDays = (a, b) => Math.round((b - a) / MS_DAY);
const startOfDay = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());
const fmtShort = d => d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
const fmtFull = d => d.toLocaleDateString();
const weekdayShort = d => ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
const isWeekend = d => d.getDay() === 0 || d.getDay() === 6;

/* ----------------------------- calendar logic ----------------------------- */
// A weekday config:
//   { enabled: bool, start: "HH:MM", end: "HH:MM", breaks: [{name, durationMin}] }
// Daily net hours = (end - start) in minutes - sum(breaks.durationMin), /60.
const minutesBetween = (s, e) => {
  const [sh, sm] = s.split(":").map(Number);
  const [eh, em] = e.split(":").map(Number);
  return (eh * 60 + em) - (sh * 60 + sm);
};
const weekdayNetHours = wd => {
  if (!wd || !wd.enabled) return 0;
  const mins = minutesBetween(wd.start, wd.end);
  const stops = (wd.breaks || []).reduce((a, b) => a + (Number(b.durationMin) || 0), 0);
  return Math.max(0, (mins - stops) / 60);
};

const DEFAULT_WEEKDAY = { enabled: true, start: "08:00", end: "17:00",
  breaks: [{ name: "Lunch", durationMin: 60 }] };
const DEFAULT_WEEKEND = { enabled: false, start: "08:00", end: "17:00", breaks: [] };

const makeDefaultGlobalCalendar = () => ({
  weekdays: {
    0: { ...DEFAULT_WEEKEND },  // Sun
    1: { ...DEFAULT_WEEKDAY },  // Mon
    2: { ...DEFAULT_WEEKDAY },
    3: { ...DEFAULT_WEEKDAY },
    4: { ...DEFAULT_WEEKDAY },
    5: { ...DEFAULT_WEEKDAY },
    6: { ...DEFAULT_WEEKEND },  // Sat
  },
  exceptions: {} // { "YYYY-MM-DD": <weekdayConfig> | { closed: true } }
});

// Resolve net hours available on a specific date for a specific WC.
const availableHours = (wcId, date, globalCal, wcOverrides) => {
  const iso = toISO(date);
  const wcOv = wcOverrides[wcId] || {};
  // Exceptions: per-WC first, then global
  if (wcOv.exceptions && iso in wcOv.exceptions) {
    const ex = wcOv.exceptions[iso];
    if (ex && ex.closed) return 0;
    return weekdayNetHours(ex);
  }
  if (globalCal.exceptions && iso in globalCal.exceptions) {
    const ex = globalCal.exceptions[iso];
    if (ex && ex.closed) return 0;
    return weekdayNetHours(ex);
  }
  // Weekday override per WC
  const dow = date.getDay();
  if (wcOv.weekdays && wcOv.weekdays[dow]) return weekdayNetHours(wcOv.weekdays[dow]);
  return weekdayNetHours(globalCal.weekdays[dow]);
};

/* ----------------------------- sample data ------------------------------ */
const SAMPLE_ITEMS = ["SEAL-A100","SEAL-A200","GASK-B11","GASK-B22","HOSE-C7","HOSE-C8","DAMP-D1","DAMP-D2"];
const SAMPLE_WCS = [
  { wc: "WC-PRESS-01", rg: "Pressing" },
  { wc: "WC-PRESS-02", rg: "Pressing" },
  { wc: "WC-VULC-01",  rg: "Vulcanisation" },
  { wc: "WC-VULC-02",  rg: "Vulcanisation" },
  { wc: "WC-FIN-01",   rg: "Finishing" },
];

const generateSampleMOs = () => {
  const today = startOfDay(new Date());
  const mos = [];
  const N = 32;
  // Target mix:
  //   20% already in delay (RED — delivery date in the past)
  //   80% on time (BLUE), of which 30% have a tight delivery date
  //   so any forward move makes them YELLOW.
  const pastCount  = Math.round(N * 0.20);
  const tightCount = Math.round((N - pastCount) * 0.30);
  const categories = [];
  for (let i = 0; i < pastCount;  i++) categories.push("past");
  for (let i = 0; i < tightCount; i++) categories.push("tight");
  while (categories.length < N)        categories.push("relaxed");
  // Shuffle so categories aren't grouped at the top.
  for (let i = categories.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [categories[i], categories[j]] = [categories[j], categories[i]];
  }

  for (let i = 0; i < N; i++) {
    const wc = SAMPLE_WCS[i % SAMPLE_WCS.length];
    const hours = 4 + Math.floor(Math.random() * 28);     // 4..32h
    const span  = Math.max(1, Math.ceil(hours / 8));
    let startOffset, dueOffset;
    if (categories[i] === "past") {
      // Delivery date already in the past
      dueOffset   = -10 + Math.floor(Math.random() * 8);  // -10..-3
      startOffset = Math.max(0, dueOffset - span + 1);    // start never in the past
    } else if (categories[i] === "tight") {
      // Tight delivery: due ≈ scheduled end (0 slack → easily becomes yellow)
      startOffset = 1 + Math.floor(Math.random() * 14);   // +1..+14
      dueOffset   = startOffset + span - 1;               // due == end
    } else {
      // Relaxed: 5–18 days of slack
      startOffset = 1 + Math.floor(Math.random() * 20);   // +1..+20
      dueOffset   = startOffset + span - 1 + 5 + Math.floor(Math.random() * 14);
    }
    const start = addDays(today, startOffset);
    const end   = addDays(start, span - 1);
    const due   = addDays(today, dueOffset);
    mos.push({
      MO_ID: `MO-${1000 + i}`,
      Item: SAMPLE_ITEMS[i % SAMPLE_ITEMS.length],
      Quantity: 100 + Math.floor(Math.random() * 900),
      Capacity_Hours: hours,
      Work_Center: wc.wc,
      Resource_Group: wc.rg,
      Requested_Delivery_Date: toISO(due),
      Current_Start_Date: toISO(start),
      Current_End_Date: toISO(end),
    });
  }
  return mos;
};

/* ------------------------- normalize incoming rows ----------------------- */
const REQUIRED_COLS = ["MO_ID","Item","Quantity","Capacity_Hours","Work_Center","Requested_Delivery_Date"];
const OPTIONAL_COLS = ["Resource_Group","Current_Start_Date","Current_End_Date"];

const normalizeRow = r => {
  // Trim string keys; SheetJS keeps original column names.
  const out = {};
  for (const [k, v] of Object.entries(r)) {
    out[String(k).trim()] = typeof v === "string" ? v.trim() : v;
  }
  return out;
};

const validateRows = rows => {
  const errors = [];
  rows.forEach((r, i) => {
    REQUIRED_COLS.forEach(c => {
      if (r[c] === undefined || r[c] === null || r[c] === "") {
        errors.push(`Row ${i+2}: missing required column "${c}"`);
      }
    });
    if (r.Capacity_Hours !== undefined && (isNaN(+r.Capacity_Hours) || +r.Capacity_Hours <= 0)) {
      errors.push(`Row ${i+2}: Capacity_Hours must be a positive number`);
    }
  });
  return errors;
};

/* --------------------- initial scheduling for an MO --------------------- */
// Decide bar start/end (in days) given capacity hours and the WC daily capacity.
// We use the WC's typical weekday capacity (Mon if enabled, else first enabled day, else 8h).
const typicalDailyHours = (wcId, globalCal, wcOverrides) => {
  const cal = (wcOverrides[wcId] && wcOverrides[wcId].weekdays) || globalCal.weekdays;
  for (const dow of [1,2,3,4,5,6,0]) {
    const wd = cal[dow] || globalCal.weekdays[dow];
    const h = weekdayNetHours(wd);
    if (h > 0) return h;
  }
  return 8;
};

// Pack all MOs in a single Work Center, respecting per-day residual
// capacity left by earlier-scheduled MOs. Returns a {moId: [{date, hours}]} map
// for the MOs in `wcMos`, and mutates `usedByIso` so callers can chain.
const packWcSchedules = (wcMos, wc, globalCal, wcOverrides, usedByIso = {}) => {
  // Sort by newStart so MOs anchored earlier book their days first.
  const list = wcMos.slice().sort((a, b) =>
    (a.newStart || "").localeCompare(b.newStart || "") ||
    a.MO_ID.localeCompare(b.MO_ID));
  const out = {};
  for (const m of list) {
    const sched = [];
    let remaining = Number(m.Capacity_Hours) || 0;
    let cursor = parseISO(m.newStart);
    if (!cursor || remaining <= 0) { out[m.MO_ID] = sched; continue; }
    let safety = 730;
    while (remaining > 0.0001 && safety-- > 0) {
      const iso = toISO(cursor);
      const cap = availableHours(wc, cursor, globalCal, wcOverrides);
      const usedToday = usedByIso[iso] || 0;
      const free = Math.max(0, cap - usedToday);
      if (free > 0) {
        const take = Math.min(free, remaining);
        sched.push({ date: new Date(cursor), hours: take });
        usedByIso[iso] = usedToday + take;
        remaining -= take;
      }
      cursor = addDays(cursor, 1);
    }
    out[m.MO_ID] = sched;
  }
  return out;
};

// Pack schedules for a whole MO list grouped by WC. Excluded MOs are
// not allocated and get an empty schedule.
const packAllSchedules = (mos, globalCal, wcOverrides, excludedWcs) => {
  const all = {};
  const byWc = new Map();
  for (const m of mos) {
    if (m.excluded || (excludedWcs && excludedWcs.has(m.Work_Center))) {
      all[m.MO_ID] = [];
      continue;
    }
    if (!byWc.has(m.Work_Center)) byWc.set(m.Work_Center, []);
    byWc.get(m.Work_Center).push(m);
  }
  for (const [wc, list] of byWc.entries()) {
    const part = packWcSchedules(list, wc, globalCal, wcOverrides);
    Object.assign(all, part);
  }
  return all;
};

// Single-MO schedule, ignoring other MOs. Used for the initial backward-
// from-due-date placement at import time, where no other MOs exist yet.
const computeMoSchedule = (mo, globalCal, wcOverrides) => {
  const out = [];
  let remaining = Number(mo.Capacity_Hours) || 0;
  let cursor = parseISO(mo.newStart);
  if (!cursor || remaining <= 0) return out;
  let safety = 730;
  while (remaining > 0.0001 && safety-- > 0) {
    const av = availableHours(mo.Work_Center, cursor, globalCal, wcOverrides);
    if (av > 0) {
      const used = Math.min(av, remaining);
      out.push({ date: new Date(cursor), hours: used });
      remaining -= used;
    }
    cursor = addDays(cursor, 1);
  }
  return out;
};

// Backward from due date across only open days until Capacity_Hours covered.
// Returns the earliest open day touched (= the proposed newStart).
const placeBackwardFromDue = (mo, globalCal, wcOverrides) => {
  const due = parseISO(mo.Requested_Delivery_Date) || startOfDay(new Date());
  let remaining = Number(mo.Capacity_Hours) || 0;
  let cursor = new Date(due);
  let lastOpen = new Date(due);
  let safety = 730;
  while (remaining > 0.0001 && safety-- > 0) {
    const av = availableHours(mo.Work_Center, cursor, globalCal, wcOverrides);
    if (av > 0) {
      remaining -= Math.min(av, remaining);
      lastOpen = new Date(cursor);
    }
    if (remaining <= 0.0001) break;
    cursor = addDays(cursor, -1);
  }
  return { newStart: toISO(lastOpen) };
};

const initialPlace = (mo, globalCal, wcOverrides) => {
  const cs = parseISO(mo.Current_Start_Date);
  if (cs) return { newStart: toISO(cs) };
  return placeBackwardFromDue(mo, globalCal, wcOverrides);
};

/* ---------- enrich MO list with derived fields used by the Gantt -------- */
const enrichMOs = (rows, globalCal, wcOverrides) => {
  return rows.map(raw => {
    const r = normalizeRow(raw);
    const base = {
      MO_ID: String(r.MO_ID),
      Item: String(r.Item || ""),
      Quantity: Number(r.Quantity) || 0,
      Capacity_Hours: Number(r.Capacity_Hours) || 0,
      Work_Center: String(r.Work_Center),
      Resource_Group: r.Resource_Group ? String(r.Resource_Group) : "(Unassigned)",
      Requested_Delivery_Date: r.Requested_Delivery_Date
        ? toISO(parseISO(r.Requested_Delivery_Date)) : "",
      Current_Start_Date: r.Current_Start_Date
        ? toISO(parseISO(r.Current_Start_Date)) : "",
      Current_End_Date: r.Current_End_Date
        ? toISO(parseISO(r.Current_End_Date)) : "",
    };
    const placement = initialPlace(base, globalCal, wcOverrides);
    return {
      ...base,
      Original_Work_Center: base.Work_Center,
      Original_newStart: placement.newStart,
      newStart: placement.newStart,
      excluded: false,
    };
  });
};

// Tracks whether the planner has moved the MO since import.
const isMoved = (mo) =>
  mo.Work_Center !== mo.Original_Work_Center ||
  (mo.Original_newStart && mo.newStart !== mo.Original_newStart);

/* ============================================================================
   Top-level App component
   ========================================================================== */
function App() {
  const [mos, setMos] = useState([]);
  const [globalCal, setGlobalCal] = useState(makeDefaultGlobalCalendar());
  const [wcOverrides, setWcOverrides] = useState({}); // { wcId: { weekdays:{}, exceptions:{} } }
  const [excludedWcs, setExcludedWcs] = useState(new Set());
  const [zoom, setZoom] = useState("day"); // "day" | "hour"
  const [pxPerDay, setPxPerDay] = useState(48);
  const [view, setView] = useState("gantt"); // "gantt" | "compare"
  const [compareScenario, setCompareScenario] = useState(null);
  const [scenarioName, setScenarioName] = useState("Scenario A");
  const [errorBanner, setErrorBanner] = useState(null);
  const [calendarModal, setCalendarModal] = useState(null); // null | "global" | wcId
  const [sidebarOpen, setSidebarOpen] = useState(true);

  /* -------------------- Excel / CSV import -------------------- */
  const onImport = async (file) => {
    setErrorBanner(null);
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: "array", cellDates: true });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
      const errs = validateRows(rows);
      if (errs.length) {
        setErrorBanner("Import errors:\n" + errs.slice(0, 8).join("\n") +
          (errs.length > 8 ? `\n…and ${errs.length-8} more.` : ""));
        return;
      }
      setMos(enrichMOs(rows, globalCal, wcOverrides));
    } catch (e) {
      setErrorBanner("Could not read file: " + e.message);
    }
  };

  const loadSample = () => {
    setMos(enrichMOs(generateSampleMOs(), globalCal, wcOverrides));
    setErrorBanner(null);
  };

  /* -------------------- Schedules (calendar + capacity aware) ----------
     Within each Work Center, MOs are packed in order of their newStart
     anchor and only consume the residual capacity left on each day after
     earlier MOs have booked theirs. Closed days are skipped. This is what
     lets a planner drag an MO onto a 50%-saturated day and have it fill
     the remaining 4h on that day before spilling into the next ones.
  */
  const schedules = useMemo(
    () => packAllSchedules(mos, globalCal, wcOverrides, excludedWcs),
    [mos, globalCal, wcOverrides, excludedWcs]
  );

  const effectiveEnd = useCallback((mo) => {
    const s = schedules[mo.MO_ID];
    if (s && s.length) return s[s.length-1].date;
    return parseISO(mo.newStart);
  }, [schedules]);

  /* -------------------- Excel / CSV export -------------------- */
  const exportRows = useMemo(() => mos.map(m => {
    const reassigned = m.Work_Center !== m.Original_Work_Center;
    const due = parseISO(m.Requested_Delivery_Date);
    const ned = effectiveEnd(m);
    const late = (!m.excluded && due && ned && ned > due);
    return {
      MO_ID: m.MO_ID,
      Item: m.Item,
      Original_Work_Center: m.Original_Work_Center,
      New_Work_Center: reassigned ? m.Work_Center : "",
      New_Start_Date: m.excluded ? "" : m.newStart,
      New_End_Date: m.excluded ? "" : (ned ? toISO(ned) : ""),
      Requested_Delivery_Date: m.Requested_Delivery_Date,
      Late_Flag: m.excluded ? "" : (late ? "Y" : "N"),
      Days_Late: (!m.excluded && late) ? diffDays(due, ned) : "",
      Excluded_From_Scenario: m.excluded ? "Y" : "N",
    };
  }), [mos, effectiveEnd]);

  const doExport = (kind) => {
    const ws = XLSX.utils.json_to_sheet(exportRows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Scenario");
    const safe = (scenarioName || "scenario").replace(/[^a-z0-9_-]/gi, "_");
    if (kind === "csv") {
      const csv = XLSX.utils.sheet_to_csv(ws);
      downloadBlob(new Blob([csv], { type: "text/csv" }), `${safe}.csv`);
    } else {
      XLSX.writeFile(wb, `${safe}.xlsx`);
    }
  };

  const downloadBlob = (blob, name) => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  };

  /* -------------------- Scenario save / load -------------------- */
  const saveScenario = () => {
    const payload = {
      name: scenarioName,
      savedAt: new Date().toISOString(),
      globalCal, wcOverrides,
      mos,
      excludedWcs: [...excludedWcs],
    };
    downloadBlob(new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" }),
                 `${(scenarioName || "scenario").replace(/[^a-z0-9_-]/gi, "_")}.json`);
  };

  const loadScenario = async (file, asCompare = false) => {
    try {
      const txt = await file.text();
      const p = JSON.parse(txt);
      if (asCompare) {
        setCompareScenario(p);
        setView("compare");
      } else {
        setScenarioName(p.name || "Loaded scenario");
        setGlobalCal(p.globalCal || makeDefaultGlobalCalendar());
        setWcOverrides(p.wcOverrides || {});
        setMos(p.mos || []);
        setExcludedWcs(new Set(p.excludedWcs || []));
      }
    } catch (e) {
      setErrorBanner("Could not load scenario: " + e.message);
    }
  };

  /* -------------------- Visible MO set (hide deselected) -------------------- */
  // An MO is rendered only if it is included AND its Work_Center is included.
  const visibleMos = useMemo(
    () => mos.filter(m => !m.excluded && !excludedWcs.has(m.Work_Center)),
    [mos, excludedWcs]
  );

  /* -------------------- Grouping for Gantt rows (visible only) --------
     Row order is the import order (the order in the `mos` array). It is
     intentionally NOT sorted by start date — otherwise dragging an MO past
     another would reshuffle rows on every mouse move. Row order can change
     only when the planner clicks Realign or moves an MO to a different WC.
  */
  const grouped = useMemo(() => {
    const map = new Map();
    for (const mo of visibleMos) {
      const rg = mo.Resource_Group || "(Unassigned)";
      const wc = mo.Work_Center;
      if (!map.has(rg)) map.set(rg, new Map());
      const g = map.get(rg);
      if (!g.has(wc)) g.set(wc, []);
      g.get(wc).push(mo);
    }
    return [...map.entries()]
      .sort(([a],[b]) => a.localeCompare(b))
      .map(([rg, wcs]) => ({
        rg,
        wcs: [...wcs.entries()].sort(([a],[b]) => a.localeCompare(b))
                .map(([wc, list]) => ({ wc, mos: list }))
      }));
  }, [visibleMos]);

  // For the sidebar (all WCs across the data, regardless of exclusion)
  const groupedAll = useMemo(() => {
    const map = new Map();
    for (const mo of mos) {
      const rg = mo.Resource_Group || "(Unassigned)";
      const wc = mo.Work_Center;
      if (!map.has(rg)) map.set(rg, new Map());
      const g = map.get(rg);
      if (!g.has(wc)) g.set(wc, []);
      g.get(wc).push(mo);
    }
    return [...map.entries()]
      .sort(([a],[b]) => a.localeCompare(b))
      .map(([rg, wcs]) => ({
        rg,
        wcs: [...wcs.entries()].sort(([a],[b]) => a.localeCompare(b))
                .map(([wc, list]) => ({ wc, mos: list }))
      }));
  }, [mos]);

  const visibleWcs = useMemo(() => {
    const s = new Set();
    visibleMos.forEach(m => s.add(m.Work_Center));
    return [...s].sort();
  }, [visibleMos]);

  /* -------------------- Time window for the Gantt -------------------- */
  const timeWindow = useMemo(() => {
    if (visibleMos.length === 0) {
      const today = startOfDay(new Date());
      return { start: today, end: addDays(today, 30) };
    }
    let min = null, max = null;
    for (const m of visibleMos) {
      const s = parseISO(m.newStart);
      const sched = schedules[m.MO_ID] || [];
      const e = sched.length ? sched[sched.length-1].date : s;
      const due = parseISO(m.Requested_Delivery_Date);
      if (s && (min == null || s < min)) min = s;
      if (e && (max == null || e > max)) max = e;
      if (due && (max == null || due > max)) max = due;
    }
    if (!min || !max) {
      const today = startOfDay(new Date());
      return { start: today, end: addDays(today, 30) };
    }
    return { start: addDays(min, -2), end: addDays(max, 4) };
  }, [visibleMos, schedules]);

  const days = useMemo(() => {
    const arr = [];
    const total = Math.max(1, diffDays(timeWindow.start, timeWindow.end) + 1);
    for (let i = 0; i < total; i++) arr.push(addDays(timeWindow.start, i));
    return arr;
  }, [timeWindow]);

  /* -------------------- Per-day saturation per WC -------------------- */
  // Walks the per-MO schedule (which already skips closed days), so allocation
  // never lands on a closed day. Available hours come from the calendar.
  const saturation = useMemo(() => {
    const out = {};
    for (const wc of visibleWcs) {
      out[wc] = days.map(d => ({
        allocated: 0,
        available: availableHours(wc, d, globalCal, wcOverrides),
      }));
    }
    for (const m of visibleMos) {
      const sched = schedules[m.MO_ID] || [];
      const bucket = out[m.Work_Center];
      if (!bucket) continue;
      for (const e of sched) {
        const idx = diffDays(timeWindow.start, e.date);
        if (idx >= 0 && idx < bucket.length) bucket[idx].allocated += e.hours;
      }
    }
    return out;
  }, [visibleMos, days, visibleWcs, globalCal, wcOverrides, schedules, timeWindow.start]);

  /* -------------------- KPIs -------------------- */
  const kpis = useMemo(
    () => computeKpis(visibleMos, saturation, schedules),
    [visibleMos, saturation, schedules]
  );

  /* -------------------- Realign (sequence MOs within each selected WC) ------
     Operates only on MOs that are currently selected AND belong to a
     currently selected Work Center. Anything unflagged (excluded MO or
     excluded WC) is left untouched — its row, its newStart, everything.

     For each affected WC the visible MOs are sorted by their current
     start, then packed end-to-end starting from max(first MO's start,
     today). The resulting row order in each affected WC matches the new
     temporal order, so the Gantt looks clean after the action.
  */
  const realign = () => {
    setMos(prev => {
      const today = startOfDay(new Date());
      // Group affected MOs by WC, preserving their objects
      const byWc = new Map();
      for (const m of prev) {
        if (m.excluded || excludedWcs.has(m.Work_Center)) continue;
        if (!byWc.has(m.Work_Center)) byWc.set(m.Work_Center, []);
        byWc.get(m.Work_Center).push(m);
      }
      // Compute new newStart for every affected MO, in sequence per WC.
      // Pack each MO into the residual day capacity left by earlier MOs in
      // the same WC — so a 50%-saturated day is filled before spilling to
      // the next day.
      const updates = {};       // { moId: newStartISO }
      const sortedPerWc = {};   // { wc: [moId, moId, ...] in new order }
      for (const [wc, list] of byWc.entries()) {
        list.sort((a,b) => (a.newStart||"").localeCompare(b.newStart||"")
                           || a.MO_ID.localeCompare(b.MO_ID));
        const usedByIso = {};
        let cursor = list[0] ? parseISO(list[0].newStart) : null;
        if (cursor && cursor < today) cursor = today;
        const idsInOrder = [];
        for (const m of list) {
          if (cursor < today) cursor = today;
          const ns = toISO(cursor);
          updates[m.MO_ID] = ns;
          idsInOrder.push(m.MO_ID);
          // Pack this MO into the WC's residual capacity, updating usedByIso.
          const part = packWcSchedules([{ ...m, newStart: ns }], wc,
                                        globalCal, wcOverrides, usedByIso);
          const sched = part[m.MO_ID] || [];
          if (sched.length) {
            const lastDay = sched[sched.length-1].date;
            const lastIso = toISO(lastDay);
            const capLast = availableHours(wc, lastDay, globalCal, wcOverrides);
            const residual = Math.max(0, capLast - (usedByIso[lastIso] || 0));
            cursor = residual > 0.0001 ? lastDay : addDays(lastDay, 1);
          } else {
            cursor = addDays(cursor, 1);
          }
        }
        sortedPerWc[wc] = idsInOrder;
      }
      // Build the result array. For each affected WC we collect the indexes
      // that its MOs currently occupy in `prev`, then refill those slots
      // with the WC's MOs in their new order. Untouched MOs stay put.
      const result = prev.slice();
      for (const [wc, idsInOrder] of Object.entries(sortedPerWc)) {
        const slots = [];
        for (let i = 0; i < prev.length; i++) {
          if (prev[i].Work_Center === wc && !prev[i].excluded) slots.push(i);
        }
        // slots.length === idsInOrder.length by construction.
        const byId = new Map(byWc.get(wc).map(m => [m.MO_ID, m]));
        for (let k = 0; k < slots.length; k++) {
          const moId = idsInOrder[k];
          const original = byId.get(moId);
          result[slots[k]] = { ...original, newStart: updates[moId] };
        }
      }
      return result;
    });
  };

  /* -------------------- Drag handlers -------------------- */
  const draggingRef = useRef(null);

  const onBarMouseDown = (e, mo) => {
    e.preventDefault();
    draggingRef.current = {
      moId: mo.MO_ID,
      startX: e.clientX,
      startY: e.clientY,
      origStart: parseISO(mo.newStart),
      origWc: mo.Work_Center,
      deltaDays: 0,
      targetWc: mo.Work_Center,
    };
    document.body.style.cursor = "grabbing";
    document.body.classList.add("dragging-mo");
    window.addEventListener("mousemove", onBarMouseMove);
    window.addEventListener("mouseup", onBarMouseUp);
  };

  const onBarMouseMove = (e) => {
    const drag = draggingRef.current;
    if (!drag) return;
    const dx = e.clientX - drag.startX;
    drag.deltaDays = Math.round(dx / pxPerDay);
    // Detect vertical drop target: find which WC row is under the mouse.
    const el = document.elementFromPoint(e.clientX, e.clientY);
    if (el) {
      const wcAttr = el.closest("[data-wc-row]");
      if (wcAttr) drag.targetWc = wcAttr.getAttribute("data-wc-row");
    }
    // Visual preview: only move newStart (and Work_Center). End is derived.
    // Clamp newStart to >= today so the planner cannot schedule in the past.
    const today = startOfDay(new Date());
    setMos(prev => prev.map(m => {
      if (m.MO_ID !== drag.moId) return m;
      let candidate = addDays(drag.origStart, drag.deltaDays);
      if (candidate < today) candidate = today;
      return { ...m, newStart: toISO(candidate), Work_Center: drag.targetWc };
    }));
  };

  const onBarMouseUp = () => {
    draggingRef.current = null;
    document.body.style.cursor = "";
    document.body.classList.remove("dragging-mo");
    window.removeEventListener("mousemove", onBarMouseMove);
    window.removeEventListener("mouseup", onBarMouseUp);
  };

  /* -------------------- Renders -------------------- */
  return (
    <div className="flex flex-col h-full">
      <Toolbar
        scenarioName={scenarioName} setScenarioName={setScenarioName}
        onImport={onImport} loadSample={loadSample}
        onExport={doExport}
        saveScenario={saveScenario} loadScenario={loadScenario}
        zoom={zoom} setZoom={setZoom}
        pxPerDay={pxPerDay} setPxPerDay={setPxPerDay}
        openCalendar={() => setCalendarModal("global")}
        view={view} setView={setView}
        hasData={mos.length > 0}
        realign={realign}
        sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen}
      />
      {errorBanner && (
        <div className="bg-red-50 border-y border-red-200 text-red-800 px-4 py-2 text-sm whitespace-pre-wrap">
          {errorBanner} <button className="ml-2 underline" onClick={()=>setErrorBanner(null)}>dismiss</button>
        </div>
      )}
      <KpiBar k={kpis} mosCount={visibleMos.length} />
      {view === "gantt" ? (
        <div className="flex-1 flex overflow-hidden">
          {sidebarOpen && (
            <Sidebar
              grouped={groupedAll}
              excludedWcs={excludedWcs}
              toggleWc={(wc) => {
                const n = new Set(excludedWcs);
                n.has(wc) ? n.delete(wc) : n.add(wc);
                setExcludedWcs(n);
              }}
              openCalendar={(wc) => setCalendarModal(wc)}
              close={() => setSidebarOpen(false)}
              mos={mos}
              toggleExcludeMo={(moId) => setMos(prev => prev.map(m =>
                m.MO_ID === moId ? { ...m, excluded: !m.excluded } : m))}
            />
          )}
          {mos.length === 0 ? (
            <EmptyState loadSample={loadSample} />
          ) : (
            <Gantt
              grouped={grouped}
              days={days}
              pxPerDay={pxPerDay}
              zoom={zoom}
              schedules={schedules}
              saturation={saturation}
              globalCal={globalCal}
              wcOverrides={wcOverrides}
              onBarMouseDown={onBarMouseDown}
              toggleExclude={(moId) => setMos(prev => prev.map(m =>
                m.MO_ID === moId ? { ...m, excluded: !m.excluded } : m))}
            />
          )}
        </div>
      ) : (
        <CompareView
          current={{ name: scenarioName, mos: visibleMos, saturation, kpis }}
          other={compareScenario}
          loadOther={loadScenario}
          back={() => setView("gantt")}
        />
      )}
      {calendarModal && (
        <CalendarModal
          target={calendarModal}
          globalCal={globalCal} setGlobalCal={setGlobalCal}
          wcOverrides={wcOverrides} setWcOverrides={setWcOverrides}
          close={() => setCalendarModal(null)}
        />
      )}
    </div>
  );
}

/* ------------------------------- KPIs ----------------------------------- */
// `mos` here is the *visible* set; `schedules` is a {moId: [{date,hours}]} map.
function computeKpis(mos, saturation, schedules) {
  let total = 0, late = 0, sumSat = 0, satDays = 0, overloadDays = 0, reassigns = 0;
  for (const m of mos) {
    total++;
    if (m.Work_Center !== m.Original_Work_Center) reassigns++;
    const due = parseISO(m.Requested_Delivery_Date);
    const sched = schedules ? schedules[m.MO_ID] : null;
    const ned = sched && sched.length ? sched[sched.length-1].date : parseISO(m.newStart);
    if (due && ned && ned > due) late++;
  }
  for (const wc of Object.keys(saturation)) {
    for (const cell of saturation[wc]) {
      if (cell.available > 0) {
        const ratio = cell.allocated / cell.available;
        sumSat += ratio;
        satDays++;
        if (ratio > 1.0001) overloadDays++;
      }
    }
  }
  return { total, late, avgSat: satDays ? sumSat / satDays : 0, overloadDays, reassigns };
}

        <input type="range" min="20" max="320" value={pxPerDay}

    <div className={`px-3 py-1.5 rounded border text-sm bg-white ${tone}`}>
      <div className="text-[11px] uppercase tracking-wide text-slate-500">{label}</div>
      <div className="text-lg font-semibold leading-tight">{val}</div>

      {tile("MOs in scenario", k.total)}
      {tile("Late MOs", k.late, k.late > 0 ? "border-red-300" : "")}

/* ------------------------------ Gantt view ------------------------------ */
const ROW_H = 32;       // MO bar row height
const CAP_H = 16;       // capacity heat strip per WC
const HEADER_H = 56;
const LABEL_W = 240;

function Gantt({ grouped, days, pxPerDay, zoom, schedules, saturation,
                 globalCal, wcOverrides, onBarMouseDown, toggleExclude }) {
  const totalWidth = days.length * pxPerDay;

  // Layout: list of rows in order, with kind + y position.
  const rows = [];
  for (const g of grouped) {
    rows.push({ kind: "rg", rg: g.rg });
    for (const w of g.wcs) {
      rows.push({ kind: "wc", wc: w.wc });
      rows.push({ kind: "cap", wc: w.wc });
      for (const mo of w.mos) {
        rows.push({ kind: "mo", wc: w.wc, mo });
      }
    }
  }
  const rowH = r => r.kind === "rg" ? 24 : r.kind === "wc" ? 24
                   : r.kind === "cap" ? CAP_H : ROW_H;
  const yOf = [];
  let y = 0;
  for (const r of rows) { yOf.push(y); y += rowH(r); }
  const totalHeight = y;

  // For each WC, find the y-range covered by its rows (drop target during drag).
  const wcRowRanges = {};
  rows.forEach((r, i) => {
    if (!r.wc) return;
    const top = yOf[i], bot = top + rowH(r);
    if (!wcRowRanges[r.wc]) wcRowRanges[r.wc] = { top, bot };
    else {
      wcRowRanges[r.wc].top = Math.min(wcRowRanges[r.wc].top, top);
      wcRowRanges[r.wc].bot = Math.max(wcRowRanges[r.wc].bot, bot);
    }
  });

  const dayX = i => i * pxPerDay;
  const dayIndex = (d) => diffDays(days[0], d);

  // Convert a schedule into visual segments grouped by consecutive open days.
  const segmentsOf = (sched) => {
    const segs = [];
    let cur = null;
    for (const e of sched) {
      if (cur && diffDays(cur.last, e.date) === 1) {
        cur.last = e.date;
        cur.hours += e.hours;
      } else {
        if (cur) segs.push(cur);
        cur = { first: e.date, last: e.date, hours: e.hours };
      }
    }
    if (cur) segs.push(cur);
    return segs;
  };

  return (
    <div className="flex-1 overflow-auto scrollbar-thin bg-white relative" style={{ minWidth: 0 }}>
      <div style={{ display: "flex", minWidth: "max-content" }}>

        {/* ============ LEFT: sticky labels column ============ */}
        <div className="sticky left-0 z-20 bg-white shrink-0 border-r"
             style={{ width: LABEL_W }}>
          {/* Top-left corner (sticky on both axes) */}
          <div className="sticky top-0 z-30 bg-white border-b px-3 text-xs text-slate-500 flex items-end"
               style={{ height: HEADER_H }}>
            Group / Work Center / MO
            <span className="ml-auto text-slate-400 text-[10px]">due</span>
          </div>
          {/* Label rows */}
          <div style={{ height: totalHeight, position: "relative" }}>
            {rows.map((r, i) => {
              const yPos = yOf[i];
              if (r.kind === "rg") return (
                <div key={i} className="row-label px-3 text-xs font-semibold uppercase tracking-wide text-slate-600 bg-slate-100 border-b"
                     style={{ position: "absolute", top: yPos, left: 0, right: 0, height: 24, lineHeight: "24px" }}>
                  {r.rg}
                </div>
              );
              if (r.kind === "wc") return (
                <div key={i} className="row-label px-3 text-sm font-medium text-slate-800 border-b bg-white"
                     style={{ position: "absolute", top: yPos, left: 0, right: 0, height: 24, lineHeight: "24px" }}>
                  {r.wc}
                </div>
              );
              if (r.kind === "cap") return (
                <div key={i} className="row-label px-3 text-[10px] text-slate-500 border-b bg-white"
                     style={{ position: "absolute", top: yPos, left: 0, right: 0, height: CAP_H, lineHeight: `${CAP_H}px` }}>
                  saturation
                </div>
              );
              // MO row
              const mo = r.mo;
              const due = parseISO(mo.Requested_Delivery_Date);
              const sched = schedules[mo.MO_ID] || [];
              const ned = sched.length ? sched[sched.length-1].date : null;
              const today = startOfDay(new Date());
              const dueInPast = due && due < today;
              const movedLate = isMoved(mo) && due && ned && ned > due;
              const dueColor = dueInPast ? "text-red-600 font-semibold"
                              : movedLate ? "text-amber-600 font-semibold"
                              : "text-slate-500";
              return (
                <div key={i} className="row-label px-3 text-xs text-slate-700 border-b flex items-center gap-2 bg-white"
                     style={{ position: "absolute", top: yPos, left: 0, right: 0, height: ROW_H }}>
                  <input type="checkbox" checked={!mo.excluded}
                         onChange={() => toggleExclude(mo.MO_ID)}
                         title="Include in scenario"/>
                  <div className="flex-1 truncate" title={`${mo.MO_ID} · ${mo.Item}`}>
                    <span className="font-mono">{mo.MO_ID}</span>
                    <span className="text-slate-500"> · {mo.Item}</span>
                    <span className="text-[10px] text-slate-500"> · {mo.Capacity_Hours}h</span>
                  </div>
                  <span className={`text-[10px] tabular-nums ${dueColor}`}
                        title={`Requested delivery: ${due ? fmtFull(due) : "—"}${dueInPast?" (in the past)":movedLate?" (moved → late)":""}`}>
                    {due ? fmtShort(due) : "—"}
                  </span>
                </div>
              );
            })}
          </div>
        </div>

        {/* ============ RIGHT: time axis + grid + bars ============ */}
        <div style={{ width: totalWidth }}>
          {/* Sticky time axis */}
          <div className="sticky top-0 z-10 bg-white border-b" style={{ height: HEADER_H }}>
            <svg width={totalWidth} height={HEADER_H}>
              {/* Month bands */}
              {(() => {
                const bands = [];
                let i = 0;
                while (i < days.length) {
                  let j = i;
                  const mo = days[i].getMonth();
                  while (j < days.length && days[j].getMonth() === mo) j++;
                  bands.push({ x: i * pxPerDay, w: (j - i) * pxPerDay,
                               label: days[i].toLocaleString(undefined, { month: "long", year: "numeric" }) });
                  i = j;
                }
                return bands.map((b, k) => (
                  <g key={k}>
                    <rect x={b.x} y={0} width={b.w} height={24} fill={k % 2 ? "#f8fafc" : "#eef2f7"} />
                    <text x={b.x + 6} y={16} fontSize="11" fill="#475569">{b.label}</text>
                  </g>
                ));
              })()}
              {days.map((d, i) => {
                const av = availableHours(null, d, globalCal, wcOverrides);
                // Note: availableHours of "null" WC === global default
                const closedGlobally = av === 0;
                return (
                  <g key={i}>
                    <rect x={dayX(i)} y={24} width={pxPerDay} height={HEADER_H-24}
                          fill={closedGlobally ? "#e2e8f0" : (isWeekend(d) ? "#f1f5f9" : "#fff")}
                          stroke="#e2e8f0" />
                    <text x={dayX(i) + pxPerDay/2} y={38} fontSize="10" textAnchor="middle" fill="#64748b">
                      {weekdayShort(d)[0]}
                    </text>
                    <text x={dayX(i) + pxPerDay/2} y={50} fontSize="11" textAnchor="middle" fill="#0f172a">
                      {d.getDate()}
                    </text>
                  </g>
                );
              })}
            </svg>
          </div>

          {/* Main SVG: grid, capacity strip, bars */}
          <svg width={totalWidth} height={totalHeight} shapeRendering="crispEdges">
            {/* Vertical day grid (closed days globally shaded) */}
            {days.map((d, i) => {
              const av = availableHours(null, d, globalCal, wcOverrides);
              const closedGlobally = av === 0;
              return (
                <rect key={i} x={dayX(i)} y={0} width={pxPerDay} height={totalHeight}
                      fill={closedGlobally ? "#f1f5f9" : (isWeekend(d) ? "#fafafa" : "#fff")}
                      stroke="#eef2f7" />
              );
            })}
            {/* Row backgrounds */}
            {rows.map((r, i) => {
              const yPos = yOf[i];
              if (r.kind === "rg") return (
                <rect key={i} x={0} y={yPos} width={totalWidth} height={24} fill="#f1f5f9" stroke="#e2e8f0" />
              );
              if (r.kind === "wc") return (
                <rect key={i} x={0} y={yPos} width={totalWidth} height={24} fill="#ffffff" stroke="#e2e8f0" />
              );
              if (r.kind === "cap") {
                const sats = saturation[r.wc] || [];
                return (
                  <g key={i}>
                    {sats.map((s, k) => {
                      const ratio = s.available > 0 ? s.allocated / s.available : 0;
                      let fill = "#e5e7eb";
                      if (s.available === 0) fill = "#cbd5e1"; // closed day
                      else if (ratio > 1.0001) fill = "#fecaca";
                      else if (ratio > 0.85) fill = "#fde68a";
                      else if (ratio > 0) fill = "#bbf7d0";
                      return (
                        <g key={k}>
                          <rect x={dayX(k)} y={yPos} width={pxPerDay} height={CAP_H} fill={fill} stroke="#e5e7eb" />
                          {pxPerDay > 36 && s.available > 0 && (
                            <text x={dayX(k)+pxPerDay/2} y={yPos+CAP_H-3} fontSize="9" textAnchor="middle" fill="#334155">
                              {Math.round(ratio*100)}%
                            </text>
                          )}
                        </g>
                      );
                    })}
                  </g>
                );
              }
              return null;
            })}
            {/* Invisible drop zones per WC for vertical drag detection */}
            {Object.entries(wcRowRanges).map(([wc, range]) => (
              <foreignObject key={wc} x={0} y={range.top} width={totalWidth} height={range.bot - range.top}
                             data-wc-row={wc} style={{ pointerEvents: "auto" }}>
                <div data-wc-row={wc} style={{ width: "100%", height: "100%" }} />
              </foreignObject>
            ))}
            {/* MO bars — one rect per segment of contiguous open days */}
            {rows.map((r, i) => {
              if (r.kind !== "mo") return null;
              const yPos = yOf[i];
              const mo = r.mo;
              const sched = schedules[mo.MO_ID] || [];
              const segs = segmentsOf(sched);
              const today = startOfDay(new Date());
              const due = parseISO(mo.Requested_Delivery_Date);
              const ned = sched.length ? sched[sched.length-1].date : null;
              // Color rules:
              //   RED   — delivery date is already in the past (will always be late).
              //   YELLOW — MO has been moved AND its new end is after the delivery date.
              //   BLUE  — default (on time, or unmoved).
              const dueInPast = due && due < today;
              const movedLate = isMoved(mo) && due && ned && ned > due;
              let fill = "#3b82f6";       // blue
              if (dueInPast) fill = "#dc2626"; // red
              else if (movedLate) fill = "#f59e0b"; // yellow / amber
              const anchor = parseISO(mo.newStart);
              return (
                <g key={i} onMouseDown={(e)=>onBarMouseDown(e, mo)} className="mo-bar">
                  {segs.length === 0 && anchor && (
                    <rect x={dayIndex(anchor)*pxPerDay+1} y={yPos+4}
                          width={pxPerDay-2} height={ROW_H-8}
                          rx="4" ry="4" fill="#cbd5e1" />
                  )}
                  {segs.map((sg, k) => {
                    const x = dayIndex(sg.first) * pxPerDay + 1;
                    const w = (diffDays(sg.first, sg.last) + 1) * pxPerDay - 2;
                    return (
                      <g key={k}>
                        <rect x={x} y={yPos+4} width={Math.max(w, 4)} height={ROW_H-8}
                              rx="4" ry="4" fill={fill} />
                        {/* faint connector to next segment (across closed days) */}
                        {k < segs.length-1 && (
                          <line x1={x + w + 2}
                                x2={dayIndex(segs[k+1].first) * pxPerDay}
                                y1={yPos + ROW_H/2} y2={yPos + ROW_H/2}
                                stroke={fill} strokeWidth="1.5" strokeDasharray="2,2" opacity="0.6" />
                        )}
                      </g>
                    );
                  })}
                  {/* Label on the first segment */}
                  {segs[0] && (() => {
                    const x = dayIndex(segs[0].first) * pxPerDay + 1;
                    const w = (diffDays(segs[0].first, segs[0].last) + 1) * pxPerDay - 2;
                    if (w < 60) return null;
                    return (
                      <text x={x + 6} y={yPos + ROW_H/2 + 4} fontSize="11" fill="white" pointerEvents="none">
                        {mo.MO_ID} · {mo.Capacity_Hours}h
                      </text>
                    );
                  })()}
                  {/* Due-date dashed marker on the MO's row */}
                  {due && (() => {
                    const dx = dayIndex(due) * pxPerDay + pxPerDay/2;
                    if (dx < 0 || dx > totalWidth) return null;
                    return <line x1={dx} x2={dx} y1={yPos+2} y2={yPos+ROW_H-2}
                                  stroke="#0f172a" strokeWidth="1" strokeDasharray="2,2" />;
                  })()}
                </g>
              );
            })}
            {/* Today line */}
            {(() => {
              const today = startOfDay(new Date());
              const idx = dayIndex(today);
              if (idx < 0 || idx >= days.length) return null;
              const tx = idx * pxPerDay + pxPerDay/2;
              return <line x1={tx} x2={tx} y1={0} y2={totalHeight} stroke="#0ea5e9" strokeWidth="1.5" />;
            })()}
          </svg>
        </div>
      </div>
    </div>
  );
}

/* --------------------------- Calendar modal ------------------------------ */
const DOW_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

function CalendarModal({ target, globalCal, setGlobalCal, wcOverrides, setWcOverrides, close }) {
  const isGlobal = target === "global";
  const wc = isGlobal ? null : target;
  const wcOv = wcOverrides[wc] || { weekdays: {}, exceptions: {} };
  const baseWeekdays = isGlobal ? globalCal.weekdays
                                 : { ...globalCal.weekdays, ...(wcOv.weekdays || {}) };
  const exceptions = isGlobal ? (globalCal.exceptions || {}) : (wcOv.exceptions || {});

  const updateWeekday = (dow, patch) => {
    if (isGlobal) {
      setGlobalCal(c => ({ ...c, weekdays: { ...c.weekdays, [dow]: { ...c.weekdays[dow], ...patch } } }));
    } else {
      const cur = wcOverrides[wc] || { weekdays: {}, exceptions: {} };
      const wd = cur.weekdays[dow] || { ...globalCal.weekdays[dow] };
      setWcOverrides({
        ...wcOverrides,
        [wc]: { ...cur, weekdays: { ...cur.weekdays, [dow]: { ...wd, ...patch } } }
      });
    }
  };

  const clearWcOverride = (dow) => {
    if (isGlobal) return;
    const cur = { ...(wcOverrides[wc] || { weekdays: {}, exceptions: {} }) };
    const wds = { ...cur.weekdays }; delete wds[dow];
    setWcOverrides({ ...wcOverrides, [wc]: { ...cur, weekdays: wds } });
  };

  const addBreak = (dow) => {
    const wd = baseWeekdays[dow];
    const breaks = [...(wd.breaks || []), { name: "Break", durationMin: 15 }];
    updateWeekday(dow, { breaks });
  };
  const removeBreak = (dow, idx) => {
    const wd = baseWeekdays[dow];
    const breaks = (wd.breaks || []).filter((_, i) => i !== idx);
    updateWeekday(dow, { breaks });
  };
  const updateBreak = (dow, idx, patch) => {
    const wd = baseWeekdays[dow];
    const breaks = (wd.breaks || []).map((b, i) => i === idx ? { ...b, ...patch } : b);
    updateWeekday(dow, { breaks });
  };

  const addException = () => {
    const today = toISO(new Date());
    if (isGlobal) {
      setGlobalCal(c => ({ ...c, exceptions: { ...(c.exceptions || {}), [today]:
        { enabled: false, closed: true, start: "08:00", end: "17:00", breaks: [], note: "Holiday" } } }));
    } else {
      const cur = wcOverrides[wc] || { weekdays: {}, exceptions: {} };
      setWcOverrides({ ...wcOverrides, [wc]: { ...cur, exceptions: { ...cur.exceptions,
        [today]: { enabled: false, closed: true, start: "08:00", end: "17:00", breaks: [], note: "Exception" } } } });
    }
  };
  const updateException = (date, patch) => {
    if (isGlobal) {
      setGlobalCal(c => ({ ...c, exceptions: { ...c.exceptions, [date]: { ...c.exceptions[date], ...patch } } }));
    } else {
      const cur = wcOverrides[wc] || { weekdays: {}, exceptions: {} };
      setWcOverrides({ ...wcOverrides, [wc]: { ...cur, exceptions: { ...cur.exceptions, [date]: { ...cur.exceptions[date], ...patch } } } });
    }
  };
  const removeException = (date) => {
    if (isGlobal) {
      const ex = { ...(globalCal.exceptions || {}) }; delete ex[date];
      setGlobalCal(c => ({ ...c, exceptions: ex }));
    } else {
      const cur = { ...(wcOverrides[wc] || { weekdays: {}, exceptions: {} }) };
      const ex = { ...(cur.exceptions || {}) }; delete ex[date];
      setWcOverrides({ ...wcOverrides, [wc]: { ...cur, exceptions: ex } });
    }
  };
  const moveException = (oldDate, newDate) => {
    if (!newDate || oldDate === newDate) return;
    if (isGlobal) {
      const ex = { ...(globalCal.exceptions || {}) };
      ex[newDate] = ex[oldDate]; delete ex[oldDate];
      setGlobalCal(c => ({ ...c, exceptions: ex }));
    } else {
      const cur = { ...(wcOverrides[wc] || { weekdays: {}, exceptions: {} }) };
      const ex = { ...(cur.exceptions || {}) };
      ex[newDate] = ex[oldDate]; delete ex[oldDate];
      setWcOverrides({ ...wcOverrides, [wc]: { ...cur, exceptions: ex } });
    }
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
      <div className="bg-white rounded-lg shadow-xl w-[860px] max-h-[88vh] overflow-auto">
        <div className="px-5 py-3 border-b flex items-center">
          <div className="font-semibold">
            Calendar — {isGlobal ? "Global default" : <span>Override for <code>{wc}</code></span>}
          </div>
          <button className="ml-auto text-slate-500 hover:text-slate-900" onClick={close}>✕</button>
        </div>
        <div className="p-5 space-y-5">
          {!isGlobal && (
            <div className="text-xs text-slate-500">
              Weekdays here override the global default only for this Work Center. Clear an override to fall back to the global calendar.
            </div>
          )}
          <table className="w-full text-sm">
            <thead><tr className="text-left text-xs text-slate-500 border-b">
              <th className="py-1 w-24">Day</th>
              <th className="py-1 w-20">Enabled</th>
              <th className="py-1 w-24">Start</th>
              <th className="py-1 w-24">End</th>
              <th className="py-1">Planned stops (breaks)</th>
              <th className="py-1 w-20">Net hours</th>
              {!isGlobal && <th className="py-1 w-16"></th>}
            </tr></thead>
            <tbody>
              {[1,2,3,4,5,6,0].map(dow => {
                const wd = baseWeekdays[dow];
                const overridden = !isGlobal && wcOv.weekdays && (dow in wcOv.weekdays);
                return (
                  <tr key={dow} className={`border-b ${overridden?"bg-amber-50":""}`}>
                    <td className="py-2">{DOW_NAMES[dow]}</td>
                    <td><input type="checkbox" checked={wd.enabled}
                               onChange={e => updateWeekday(dow, { enabled: e.target.checked })} /></td>
                    <td><input type="time" value={wd.start} disabled={!wd.enabled}
                               onChange={e => updateWeekday(dow, { start: e.target.value })}
                               className="border rounded px-1 py-0.5 text-xs" /></td>
                    <td><input type="time" value={wd.end} disabled={!wd.enabled}
                               onChange={e => updateWeekday(dow, { end: e.target.value })}
                               className="border rounded px-1 py-0.5 text-xs" /></td>
                    <td>
                      <div className="flex flex-wrap gap-1 items-center">
                        {(wd.breaks || []).map((b, i) => (
                          <span key={i} className="inline-flex items-center gap-1 bg-slate-100 rounded px-1 py-0.5 text-xs">
                            <input className="w-20 bg-transparent border-b border-slate-400 outline-none"
                                   value={b.name} onChange={e=>updateBreak(dow, i, { name: e.target.value })} />
                            <input type="number" min="0" className="w-12 bg-transparent border-b border-slate-400 outline-none text-right"
                                   value={b.durationMin}
                                   onChange={e=>updateBreak(dow, i, { durationMin: +e.target.value })} />
                            <span className="text-slate-500">min</span>
                            <button onClick={()=>removeBreak(dow, i)} className="text-red-500">×</button>
                          </span>
                        ))}
                        <button className="text-xs text-blue-600 hover:underline"
                                onClick={()=>addBreak(dow)} disabled={!wd.enabled}>+ stop</button>
                      </div>
                    </td>
                    <td className="font-mono text-xs">{weekdayNetHours(wd).toFixed(2)}</td>
                    {!isGlobal && (
                      <td>
                        {overridden && (
                          <button className="text-xs text-slate-500 hover:underline"
                                  onClick={()=>clearWcOverride(dow)}>clear</button>
                        )}
                      </td>
                    )}
                  </tr>
                );
              })}
            </tbody>
          </table>

          <div>
            <div className="flex items-center mb-2">
              <div className="font-medium text-sm">Date exceptions</div>
              <button className="ml-auto text-xs text-blue-600 hover:underline" onClick={addException}>+ add exception</button>
            </div>
            <div className="text-xs text-slate-500 mb-2">
              Holidays (closed) or one-off shifts (e.g. extra Saturday). Per-WC exceptions take precedence over global ones.
            </div>
            <table className="w-full text-sm">
              <thead><tr className="text-left text-xs text-slate-500 border-b">
                <th className="py-1 w-32">Date</th><th className="py-1 w-20">Closed</th>
                <th className="py-1 w-24">Start</th><th className="py-1 w-24">End</th>
                <th className="py-1">Note</th><th className="py-1 w-20"></th>
              </tr></thead>
              <tbody>
                {Object.entries(exceptions).sort(([a],[b]) => a.localeCompare(b)).map(([date, ex]) => (
                  <tr key={date} className="border-b">
                    <td><input type="date" value={date} onChange={e => moveException(date, e.target.value)}
                               className="border rounded px-1 py-0.5 text-xs" /></td>
                    <td><input type="checkbox" checked={!!ex.closed}
                               onChange={e => updateException(date, { closed: e.target.checked })} /></td>
                    <td><input type="time" disabled={!!ex.closed} value={ex.start || "08:00"}
                               onChange={e => updateException(date, { start: e.target.value, enabled: true })}
                               className="border rounded px-1 py-0.5 text-xs" /></td>
                    <td><input type="time" disabled={!!ex.closed} value={ex.end || "17:00"}
                               onChange={e => updateException(date, { end: e.target.value, enabled: true })}
                               className="border rounded px-1 py-0.5 text-xs" /></td>
                    <td><input value={ex.note || ""} onChange={e => updateException(date, { note: e.target.value })}
                               className="border rounded px-1 py-0.5 text-xs w-full" /></td>
                    <td><button className="text-xs text-red-600 hover:underline" onClick={()=>removeException(date)}>remove</button></td>
                  </tr>
                ))}
                {Object.keys(exceptions).length === 0 && (
                  <tr><td colSpan="6" className="text-xs text-slate-500 py-2">No exceptions.</td></tr>
                )}
              </tbody>
            </table>
          </div>
        </div>
        <div className="px-5 py-3 border-t flex justify-end">
          <button className="px-4 py-1.5 rounded bg-slate-900 text-white text-sm" onClick={close}>Done</button>
        </div>
      </div>
    </div>
  );
}

/* --------------------------- Compare view ------------------------------- */
function CompareView({ current, other, loadOther, back }) {
  const otherKpis = useMemo(() => {
    if (!other) return null;
    const ogc = other.globalCal || makeDefaultGlobalCalendar();
    const oov = other.wcOverrides || {};
    const oexc = new Set(other.excludedWcs || []);
    const visible = (other.mos || []).filter(m => !m.excluded && !oexc.has(m.Work_Center));
    // Build schedules with the saved calendar (capacity-packed)
    const sched = packAllSchedules(visible, ogc, oov, oexc);
    // Time window
    let min = null, max = null;
    for (const m of visible) {
      const s = parseISO(m.newStart);
      const list = sched[m.MO_ID];
      const e = list && list.length ? list[list.length-1].date : s;
      if (s && (min == null || s < min)) min = s;
      if (e && (max == null || e > max)) max = e;
    }
    if (!min || !max) { const t = startOfDay(new Date()); min = t; max = addDays(t, 1); }
    const total = Math.max(1, diffDays(min, max) + 1);
    const days = []; for (let i=0;i<total;i++) days.push(addDays(min, i));
    const sat = {};
    const wcs = new Set(visible.map(m=>m.Work_Center));
    for (const wc of wcs) {
      sat[wc] = days.map(d => ({ allocated: 0, available: availableHours(wc, d, ogc, oov) }));
    }
    for (const m of visible) {
      const list = sched[m.MO_ID] || [];
      const bucket = sat[m.Work_Center];
      if (!bucket) continue;
      for (const e of list) {
        const idx = diffDays(min, e.date);
        if (idx >= 0 && idx < bucket.length) bucket[idx].allocated += e.hours;
      }
    }
    return computeKpis(visible, sat, sched);
  }, [other]);

  const row = (label, a, b, better="lower") => {
    let cmp = null;
    if (b != null && a != null) {
      const av = Number(a), bv = Number(b);
      if (Number.isFinite(av) && Number.isFinite(bv)) {
        if (better === "lower") cmp = av < bv ? "better" : av > bv ? "worse" : "same";
        else cmp = av > bv ? "better" : av < bv ? "worse" : "same";
      }
    }
    const c = cmp === "better" ? "text-emerald-600" : cmp === "worse" ? "text-red-600" : "text-slate-600";
    return (
      <tr className="border-b">
        <td className="py-2 text-slate-600">{label}</td>
        <td className={`py-2 font-medium ${c}`}>{a}</td>
        <td className="py-2 text-slate-600">{b ?? "—"}</td>
      </tr>
    );
  };

  return (
    <div className="flex-1 overflow-auto p-6">
      <div className="max-w-4xl mx-auto">
        <div className="flex items-center mb-4">
          <div className="text-lg font-semibold">Scenario comparison</div>
          <button className="ml-auto text-sm underline" onClick={back}>← Back to Gantt</button>
        </div>
        {!other ? (
          <div className="border rounded p-6 text-center bg-white">
            <p className="text-slate-600 mb-3">Pick a saved scenario JSON to compare with the current one.</p>
            <input type="file" accept=".json" onChange={e => e.target.files[0] && loadOther(e.target.files[0], true)} />
          </div>
        ) : (
          <div className="bg-white border rounded">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-left text-xs text-slate-500 border-b">
                  <th className="py-2 px-3">Metric</th>
                  <th className="py-2 px-3">Current — {current.name}</th>
                  <th className="py-2 px-3">Compared — {other.name}</th>
                </tr>
              </thead>
              <tbody>
                {row("MOs in scenario", current.kpis.total, otherKpis?.total, "higher")}
                {row("Late MOs", current.kpis.late, otherKpis?.late, "lower")}
                {row("Avg saturation",
                     (current.kpis.avgSat*100).toFixed(0) + "%",
                     otherKpis ? (otherKpis.avgSat*100).toFixed(0) + "%" : null,
                     "lower")}
                {row("Overload days", current.kpis.overloadDays, otherKpis?.overloadDays, "lower")}
                {row("WC reassignments", current.kpis.reassigns, otherKpis?.reassigns, "lower")}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
